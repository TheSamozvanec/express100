services: 
  postgres:
    container_name: postgres
    image: postgres:17
    restart: always
    environment:
      - POSTGRES_USER=pguser
      - POSTGRES_PASSWORD=pgpass123456
      - POSTGRES_DB=db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
     - ./data/postgres:/var/lib/postgresql/data

